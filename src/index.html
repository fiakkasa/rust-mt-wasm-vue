<body data-bs-theme="light">
  <script src="libs/vue.global.prod.min.js"></script>
  <div id="app" class="overflow-auto vh-100 vw-100 d-flex flex-column gap-2 p-2"></div>
  <script type="module">
    import init, {
      initThreadPool,
      sum_blocking,
      sum_async_promise,
      parallel_sum_blocking,
      parallel_sum_async_promise
    } from './pkg/mt_wasm.js';

    const _iterationIncrement = 11111;
    const _collectionSize = 100000;
    const _numberOfIterations = 1500;
    const _collection = Array.from({ length: _collectionSize }, (_, i) => (i + 1) * _iterationIncrement);
    const _numberOfThreads = Math.max(2, Math.trunc(navigator.hardwareConcurrency * 0.4));

    const app = Vue.createApp({
      template: `
        <div class="container-fluid flex-shrink-0">
          <h1 class="mb-2">Rust Wasm Multi-threading</h1>
          <div class="d-flex flex-column flex-md-row gap-2">
            <div class="stats lead flex-shrink-0 card">
              <div class="card-body d-flex flex-column gap-1">
                <div>
                  WASM Max Threads: <span v-text="numberOfThreads"></span>
                </div>
                <div>
                  Web Worker WASM Max Threads: <span v-text="numberOfThreads"></span>
                </div>
                <div>
                  WASM Initialized: <span v-text="wasmInitialized ? '✅' : '❌'"></span>
                </div>
                <div>
                  Worker Running: <span v-text="workerStarted ? '✅' : '❌'"></span>
                </div>
                <div>
                  Number of iterations: <span v-text="numberOfIterations"></span>
                </div>
                <div>
                  Iteration increment: <span v-text="iterationIncrement"></span>
                </div>
                <div>
                  Collection size: <span v-text="collectionSize"></span>
                </div>
              </div>
            </div>
            <div class="description card flex-fill">
              <div class="card-body lead overflow-auto" v-text="description"></div>
              <div class="card-footer">
                <button type="button" 
                        class="btn btn-secondary" 
                        @click="clicks++">
                        Interaction! (Clicks: <span v-text="clicks"></span>)
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="experiments container-fluid d-flex flex-fill gap-2 overflow-hidden">
          <div class="actions-container flex-shrink-0 overflow-auto">
            <div class="actions d-grid gap-2">
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'jsSumBlockingLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="jsSumBlockingLoopBlockingOperation" 
                      :disabled="busy">
                      <span>JavaScript</span>
                      <small>Sequential Sum (Blocking)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'jsSumAsyncLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="jsSumAsyncLoopBlockingOperation" 
                      :disabled="busy">
                      <span>JavaScript</span>
                      <small>Sequential Sum (Blocking)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'wasmSequentialSumBlockingLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="wasmSequentialSumBlockingLoopBlockingOperation" 
                      :disabled="busy || !wasmInitialized">
                      <span>WASM</span>
                      <small>Sequential Sum (Blocking)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'wasmSequentialSumAsyncLoopAsyncOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="wasmSequentialSumAsyncLoopAsyncOperation" 
                      :disabled="busy || !wasmInitialized">
                      <span>WASM</span>
                      <small>Sequential Sum (Async)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'wasmParallelSumBlockingLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="wasmParallelSumBlockingLoopBlockingOperation" 
                      :disabled="busy || !wasmInitialized">
                      <span>WASM</span>
                      <small>Parallel Sum (Blocking)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'wasmParallelSumAsyncLoopAsyncOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="wasmParallelSumAsyncLoopAsyncOperation" 
                      :disabled="busy || !wasmInitialized">
                      <span>WASM</span>
                      <small>Parallel Sum (Async)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'wasmSequentialSumAsyncLoopAsyncParallelOperations' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="wasmSequentialSumAsyncLoopAsyncParallelOperations" 
                      :disabled="busy || !wasmInitialized">
                      <span>WASM</span>
                      <small>Sequential Sum (Async)</small>
                      <small>Async Iteration <br/> (Multiple Operations)</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'wasmParallelSumAsyncLoopAsyncParallelOperations' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="wasmParallelSumAsyncLoopAsyncParallelOperations" 
                      :disabled="busy || !wasmInitialized">
                      <span>WASM</span>
                      <small>Parallel Sum (Async)</small>
                      <small>Async Iteration <br/> (Multiple Operations)</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerJsSequentialSumBlockingLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerJsSequentialSumBlockingLoopBlockingOperation" 
                      :disabled="busy || !workerStarted">
                      <span>JavaScript - Web Worker</span>
                      <small>Sequential Sum (Blocking)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerJsSequentialSumAsyncLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerJsSequentialSumAsyncLoopBlockingOperation" 
                      :disabled="busy || !workerStarted">
                      <span>JavaScript - Web Worker</span>
                      <small>Sequential Sum (Blocking)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerJsSequentialSumBlockingLoopAsyncOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerJsSequentialSumBlockingLoopAsyncOperation" 
                      :disabled="busy || !workerStarted">
                      <span>JavaScript - Web Worker</span>
                      <small>Sequential Sum (Async)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerJsSequentialSumAsyncLoopAsyncOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerJsSequentialSumAsyncLoopAsyncOperation" 
                      :disabled="busy || !workerStarted">
                      <span>JavaScript - Web Worker</span>
                      <small>Sequential Sum (Async)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerWasmSequentialSumBlockingLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerWasmSequentialSumBlockingLoopBlockingOperation" 
                      :disabled="busy || !workerStarted">
                      <span>WASM - Web Worker</span>
                      <small>Sequential Sum (Blocking)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerWasmParallelSumBlockingLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerWasmParallelSumBlockingLoopBlockingOperation" 
                      :disabled="busy || !workerStarted">
                      <span>WASM - Web Worker</span>
                      <small>Parallel Sum (Blocking)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerWasmSequentialSumAsyncLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerWasmSequentialSumAsyncLoopBlockingOperation" 
                      :disabled="busy || !workerStarted">
                      <span>WASM - Web Worker</span>
                      <small>Sequential Sum (Blocking)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerWasmParallelSumAsyncLoopBlockingOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerWasmParallelSumAsyncLoopBlockingOperation" 
                      :disabled="busy || !workerStarted">
                      <span>WASM - Web Worker</span>
                      <small>Parallel Sum (Blocking)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerWasmSequentialSumBlockingLoopAsyncOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerWasmSequentialSumBlockingLoopAsyncOperation" 
                      :disabled="busy || !workerStarted">
                      <span>WASM - Web Worker</span>
                      <small>Sequential Sum (Async)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerWasmParallelSumBlockingLoopAsyncOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerWasmParallelSumBlockingLoopAsyncOperation" 
                      :disabled="busy || !workerStarted">
                      <span>WASM - Web Worker</span>
                      <small>Parallel Sum (Async)</small>
                      <small>Blocking Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerWasmSequentialSumAsyncLoopAsyncOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerWasmSequentialSumAsyncLoopAsyncOperation" 
                      :disabled="busy || !workerStarted">
                      <span>WASM - Web Worker</span>
                      <small>Sequential Sum (Async)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
              <button type="button" 
                      class="btn d-flex flex-column gap-1" 
                      :class="[ runType === 'webWorkerWasmParallelSumAsyncLoopAsyncOperation' ? 'btn-info' : 'btn-outline-info' ]"
                      @click="webWorkerWasmParallelSumAsyncLoopAsyncOperation" 
                      :disabled="busy || !workerStarted">
                      <span>WASM - Web Worker</span>
                      <small>Parallel Sum (Async)</small>
                      <small>Async Iteration <br/> (Single Operation)</small>
                      <small>Message Per Iteration</small>
              </button>
            </div>
          </div>
          <div class="results flex-fill d-flex flex-column gap-2 overflow-auto" 
                v-if="hasResults">
              <div class="d-flex align-items-center gap-2 position-sticky sticky-top bg-body">
                <div class="lead">Result(s):</div>
                <button type="button" 
                        class="btn btn-sm btn-danger" 
                        @click="clearResults" 
                        v-if="hasResults"
                        :disabled="busy">
                        Clear
                </button>
                <button type="button" 
                        class="btn btn-sm btn-warning" 
                        @click="cancel" 
                        v-if="busy && !abortController?.signal?.aborted">
                        Abort
                </button>
              </div>
              <div class="lead" v-for="({ time, result, iteration }) in results" :key="i + '_' + time">
                <span v-text="iteration + '. '"></span>
                <span v-text="time"></span>
                <span v-text="', sum: ' + result"></span>
              </div>
          </div>
        </div>
        `,
      data() {
        return {
          wasmInitialized: false,
          worker: null,
          workerStarted: false,
          /////////////////////////////////////////
          clicks: 0,
          numberOfThreads: _numberOfThreads,
          collectionSize: _collectionSize,
          numberOfIterations: _numberOfIterations,
          iterationIncrement: _iterationIncrement,
          /////////////////////////////////////////
          abortController: null,
          runType: '',
          busy: false,
          results: [],
          description: `This is a simple example of using Multi-threading with Rust and WebAssembly.
The buttons below will run the same sum function with different implementations and measure the time it takes to complete.
The collection being summed is an array of incrementing integers.
Consider using the "Interaction!" button as an indicator of the UI responsiveness.`
        };
      },
      async beforeMount() {
        // initialize WebAssembly and thread pool before the app mounts
        // for the synchronous blocking version
        try {
          await init();
          await initThreadPool(_numberOfThreads);
          this.wasmInitialized = true;
        } catch (error) {
          console.error('Error initializing WebAssembly:', error);
        }

        // initialize the Web Worker for the asynchronous versions
        window.addEventListener('beforeunload', (event) => {
          this.worker?.terminate();
        });
        try {
          this.worker = new Worker('./worker.js', { type: 'module' });
          this.worker.onerror = (error) => console.error(error);
          this.worker.onmessage = (event) => {
            try {
              const { type, source, result } = event?.data || {};

              if (type === 'RESULT' && source === 'init') {
                this.workerStarted = result;
                return;
              }

              if (type === 'ERROR') {
                console.error('Worker error:', event);
                return;
              }

              const { startTime, iteration } = event.data;

              const endTime = Date.now();

              this.results.unshift({
                time: this.getTime(endTime, startTime),
                result: result,
                iteration
              });
            } finally {
              const done = !(this.busy && this.results.length < _numberOfIterations);
              this.busy = !done;
              done && this.clearAbortController();
            }
          };
          this.worker.postMessage({
            type: 'init',
            numberOfThreads: _numberOfThreads
          });
        } catch (error) {
          console.error('Error initializing Web Worker:', error);
        }
      },
      computed: {
        hasResults() {
          return this.results.length > 0;
        }
      },
      methods: {
        getTime(endTime, startTime, comment = '') {
          const result = endTime - startTime;
          const value = result > 0 ? result.toFixed(0) : '< 0';

          return comment ? `${value} ms ${comment}` : `${value} ms`;
        },
        setAbortController() {
          this.clearAbortController();
          this.abortController = new AbortController();
        },
        clearAbortController() {
          this.abortController?.abort();
          this.abortController = null;
        },
        cancel() {
          this.abortController?.abort();
        },
        clearResults() {
          this.results = [];
        },
        jsSumBlockingLoopBlockingOperation() {
          if (this.busy) return;

          this.runType = 'jsSumBlockingLoopBlockingOperation';
          this.busy = true;
          this.setAbortController();
          this.clearResults();

          setTimeout(() => {
            try {
              for (let i = 0; i < _numberOfIterations; i++) {
                if (this.abortController?.signal?.aborted) {
                  return;
                }

                const startTime = Date.now();
                const result = _collection.reduce((acc, v) => acc + v, 0);
                const endTime = Date.now();

                this.results.unshift({
                  time: this.getTime(endTime, startTime),
                  result,
                  iteration: i + 1
                });
              }
            } catch (error) {
              console.error('Error in jsSumBlockingLoopBlockingOperation:', error);
            } finally {
              this.busy = false;
            }
          }, 100);
        },
        jsSumAsyncLoopBlockingOperation() {
          if (this.busy) return;

          this.runType = 'jsSumAsyncLoopBlockingOperation';
          this.busy = true;
          this.setAbortController();
          this.clearResults();

          setTimeout(async () => {
            try {
              for (let i = 0; i < _numberOfIterations; i++) {
                if (this.abortController?.signal?.aborted) {
                  return;
                }

                const startTime = Date.now();
                const result = await new Promise(res =>
                  setTimeout(() =>
                    res(
                      _collection.reduce(
                        (acc, v) => acc + v,
                        0
                      )
                    )
                  )
                );
                const endTime = Date.now();

                this.results.unshift({
                  time: this.getTime(endTime, startTime),
                  result,
                  iteration: i + 1
                });
              }
            } catch (error) {
              console.error('Error in jsSumAsyncLoopBlockingOperation:', error);
            } finally {
              this.busy = false;
              this.clearAbortController();
            }
          }, 100);
        },
        wasmSequentialSumBlockingLoopBlockingOperation() {
          if (this.busy) return;

          this.runType = 'wasmSequentialSumBlockingLoopBlockingOperation';
          this.busy = true;
          this.setAbortController();
          this.clearResults();

          setTimeout(() => {
            try {
              for (let i = 0; i < _numberOfIterations; i++) {
                if (this.abortController?.signal?.aborted) {
                  return;
                }

                const startTime = Date.now();
                const result = sum_blocking(_collection);
                const endTime = Date.now();

                this.results.unshift({
                  time: this.getTime(endTime, startTime),
                  result,
                  iteration: i + 1
                });
              }
            } catch (error) {
              console.error('Error in wasmSequentialSumBlockingLoopBlockingOperation:', error);
            } finally {
              this.busy = false;
              this.clearAbortController();
            }
          }, 100);
        },
        wasmSequentialSumAsyncLoopAsyncOperation() {
          if (this.busy) return;

          this.runType = 'wasmSequentialSumAsyncLoopAsyncOperation';
          this.busy = true;
          this.setAbortController();
          this.clearResults();

          setTimeout(async () => {
            try {
              for (let i = 0; i < _numberOfIterations; i++) {
                if (this.abortController?.signal?.aborted) {
                  return;
                }

                const startTime = Date.now();
                const result = await sum_async_promise(_collection);
                const endTime = Date.now();

                this.results.unshift({
                  time: this.getTime(endTime, startTime),
                  result,
                  iteration: i + 1
                });
              }
            } catch (error) {
              console.error('Error in wasmSequentialSumAsyncLoopAsyncOperation:', error);
            } finally {
              this.busy = false;
              this.clearAbortController();
            }
          }, 100);
        },
        wasmSequentialSumAsyncLoopAsyncParallelOperations() {
          if (this.busy) return;

          this.runType = 'wasmSequentialSumAsyncLoopAsyncParallelOperations';
          this.busy = true;
          this.setAbortController();
          this.clearResults();

          setTimeout(async () => {
            try {
              const factor = 1 / _numberOfThreads;
              const numberOfIterations = Math.trunc(_numberOfIterations * factor);

              for (let i = 0; i < numberOfIterations; i++) {
                if (this.abortController?.signal?.aborted) {
                  return;
                }

                const items = Array.from({ length: _numberOfThreads }).map(() => sum_async_promise(_collection));
                const startTime = Date.now();
                const result = await Promise.all(items);
                const endTime = Date.now();

                for (let j = 0; j < result.length; j++) {
                  this.results.unshift({
                    time: this.getTime(endTime, startTime, `(total for ${items.length} operations)`),
                    result: result[j],
                    iteration: `${i + 1}[${j + 1}]`
                  })
                };
              }
            } catch (error) {
              console.error('Error in wasmSequentialSumAsyncLoopAsyncParallelOperations:', error);
            } finally {
              this.busy = false;
              this.clearAbortController();
            }
          }, 100);
        },
        wasmParallelSumAsyncLoopAsyncParallelOperations() {
          if (this.busy) return;

          this.runType = 'wasmParallelSumAsyncLoopAsyncParallelOperations';
          this.busy = true;
          this.setAbortController();
          this.clearResults();

          setTimeout(async () => {
            try {
              const factor = 1 / _numberOfThreads;
              const numberOfIterations = Math.trunc(_numberOfIterations * factor);

              for (let i = 0; i < numberOfIterations; i++) {
                if (this.abortController?.signal?.aborted) {
                  return;
                }

                const items = Array.from({ length: _numberOfThreads }).map(() => sum_async_promise(_collection));
                const startTime = Date.now();
                const result = await Promise.all(items);
                const endTime = Date.now();

                for (let j = 0; j < result.length; j++) {
                  this.results.unshift({
                    time: this.getTime(endTime, startTime, `(total for ${items.length} operations)`),
                    result: result[j],
                    iteration: `${i + 1}[${j + 1}]`
                  })
                };
              }
            } catch (error) {
              console.error('Error in wasmParallelSumAsyncLoopAsyncParallelOperations:', error);
            } finally {
              this.busy = false;
              this.clearAbortController();
            }
          }, 100);
        },
        wasmParallelSumBlockingLoopBlockingOperation() {
          if (this.busy) return;

          this.runType = 'wasmParallelSumBlockingLoopBlockingOperation';
          this.busy = true;
          this.setAbortController();
          this.clearResults();

          setTimeout(() => {
            try {
              for (let i = 0; i < _numberOfIterations; i++) {
                if (this.abortController?.signal?.aborted) {
                  return;
                }

                const startTime = Date.now();
                const result = parallel_sum_blocking(_collection);
                const endTime = Date.now();

                this.results.unshift({
                  time: this.getTime(endTime, startTime),
                  result,
                  iteration: i + 1
                });
              }
            } catch (error) {
              console.error('Error in wasmParallelSumBlockingLoopBlockingOperation:', error);
            } finally {
              this.busy = false;
              this.clearAbortController();
            }
          }, 100);
        },
        wasmParallelSumAsyncLoopAsyncOperation() {
          if (this.busy) return;

          this.runType = 'wasmParallelSumAsyncLoopAsyncOperation';
          this.busy = true;
          this.setAbortController();
          this.clearResults();

          setTimeout(async () => {
            try {
              for (let i = 0; i < _numberOfIterations; i++) {
                if (this.abortController?.signal?.aborted) {
                  return;
                }

                const startTime = Date.now();
                const result = await parallel_sum_async_promise(_collection);
                const endTime = Date.now();

                this.results.unshift({
                  time: this.getTime(endTime, startTime),
                  result,
                  iteration: i + 1
                });
